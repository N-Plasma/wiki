# Hugo configuration file
title: My Site

enableGitInfo: true
enableRobotsTXT: true

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

outputs:
  home: [html, llms]

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Contact ↗
      url: "https://github.com/N-Plasma"
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/N-Plasma/N-Plasma.github.io"
      params:
        icon: github
    - name: Theme Toggle
      params:
        type: theme-toggle

params:
  navbar:
    displayTitle: true
    displayLogo: true

  footer:
    displayCopyright: false
    displayPoweredBy: false

  editURL:
    enable: false
    base: "https://app.pagescms.org/n-plasma/n-plasma.github.io/main/collection/wiki"
    sep: "%2F"

  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: content
  
  imageZoom:
    enable: true

  externalLinkDecoration: true

  banner:
    key: 'announcement-xxx'
    message: |
      sure do hope github doesnt turn my wiki into a flashbang- OH GOD ITS SO BRIGHT
    
  # Display the last modification date
  displayUpdatedDate: false
  dateFormat: "January 2, 2006"
  # Display the author of the last modification
  displayUpdatedAuthor: false
  analytics:
    minGoogleAnalytics: false

caches:
  images:
    dir: :cacheDir/images

defaultContentLanguage: en
languages:
  en:
    languageName: English
    contentDir: content/en
    weight: 1
